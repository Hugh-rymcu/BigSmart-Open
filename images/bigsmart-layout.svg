<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .title { font: 700 42px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
      .label { font: 500 48px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
      .label-bold { font: 700 48px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
      .callout { fill: none; stroke: #8a8a8a; stroke-width: 2.2; stroke-linecap: round; }
      .callout-dark { fill: none; stroke: #444; stroke-width: 5; stroke-linecap: round; }
      .body { fill: #ff914d; stroke: #d56f32; stroke-width: 3.2; }
      .body-inner { fill: none; stroke: #e77f3d; stroke-width: 5; opacity: 0.5; }
      .screen { fill: #111827; stroke: #101010; stroke-width: 6; }
      .screen-glow { fill: #2d5f93; opacity: 0.42; }
      .button { fill: #1f1f1f; stroke: #060606; stroke-width: 5; }
      .button-ring { fill: none; stroke: #8b3f20; stroke-width: 7; opacity: 0.45; }
      .hole { fill: #42170d; stroke: #6f2b16; stroke-width: 2; opacity: 0.95; }
      .led { fill: #f0d07a; stroke: #b7791f; stroke-width: 2.5; }
      .screw { fill: #f7c181; stroke: #bf743b; stroke-width: 2; }
      .ui { font: 700 100px Arial, sans-serif; fill: #effcff; }
      .ui-small { font: 500 34px Arial, sans-serif; fill: #d8f4ff; }
    </style>
  </defs>

  <rect width="1800" height="1180" fill="#fff"/>

  <text class="title" x="55" y="70">设备布局</text>

  <!-- Front view of RYMCU BigSmart AI assistant. -->
  <rect class="body" x="280" y="270" width="1260" height="650" rx="58"/>
  <rect class="body-inner" x="405" y="335" width="1010" height="485" rx="24"/>
  <rect class="screen" x="505" y="385" width="810" height="375" rx="12"/>
  <ellipse class="screen-glow" cx="705" cy="515" rx="185" ry="120"/>
  <ellipse class="screen-glow" cx="1060" cy="535" rx="235" ry="140"/>
  <text class="ui" x="760" y="570">13:46</text>
  <text class="ui-small" x="780" y="655">rymcu-bigsmart</text>
  <text class="ui-small" x="860" y="705">v2.3.19</text>

  <circle class="screw" cx="435" cy="360" r="11"/>
  <circle class="screw" cx="1375" cy="845" r="11"/>

  <!-- Microphone holes -->
  <g id="main-mic" transform="translate(540 850)">
    <circle class="hole" cx="-33" cy="-24" r="13"/>
    <circle class="hole" cx="33" cy="-24" r="13"/>
    <circle class="hole" cx="0" cy="6" r="13"/>
    <circle class="hole" cx="-34" cy="39" r="13"/>
    <circle class="hole" cx="34" cy="39" r="13"/>
  </g>

  <g id="sub-mic" transform="translate(1390 850)">
    <circle class="hole" cx="-33" cy="-24" r="13"/>
    <circle class="hole" cx="33" cy="-24" r="13"/>
    <circle class="hole" cx="0" cy="6" r="13"/>
    <circle class="hole" cx="-34" cy="39" r="13"/>
    <circle class="hole" cx="34" cy="39" r="13"/>
  </g>

  <!-- Buttons -->
  <circle class="button-ring" cx="735" cy="850" r="42"/>
  <circle class="button" cx="735" cy="850" r="30"/>
  <circle class="button-ring" cx="920" cy="850" r="42"/>
  <circle class="button" cx="920" cy="850" r="30"/>
  <circle class="button-ring" cx="1105" cy="850" r="42"/>
  <circle class="button" cx="1105" cy="850" r="30"/>

  <!-- RGB LED -->
  <circle class="led" cx="1510" cy="872" r="9"/>

  <!-- Left callouts -->
  <text class="label" x="64" y="520">USB-C</text>
  <line class="callout-dark" x1="60" y1="552" x2="300" y2="552"/>

  <text class="label" x="64" y="740">SD卡</text>
  <line class="callout-dark" x1="60" y1="772" x2="300" y2="772"/>

  <!-- Top screen callout -->
  <text class="label-bold" x="835" y="92">2.8寸 TFT</text>
  <text class="label" x="872" y="155">触摸屏</text>
  <line class="callout" x1="925" y1="178" x2="925" y2="385"/>

  <!-- Bottom callouts -->
  <line class="callout" x1="540" y1="895" x2="540" y2="1030"/>
  <text class="label" x="447" y="1105">主麦克风</text>

  <line class="callout" x1="735" y1="885" x2="735" y2="1070"/>
  <text class="label" x="642" y="1140">电源按键</text>

  <line class="callout" x1="920" y1="885" x2="920" y2="1030"/>
  <text class="label-bold" x="805" y="1105">BOOT按键</text>

  <line class="callout" x1="1105" y1="885" x2="1105" y2="1070"/>
  <text class="label" x="1012" y="1140">用户按键</text>

  <line class="callout" x1="1390" y1="895" x2="1390" y2="1030"/>
  <text class="label" x="1297" y="1105">副麦克风</text>

  <line class="callout" x1="1510" y1="882" x2="1510" y2="1070"/>
  <text class="label-bold" x="1450" y="1140">RGB灯</text>
</svg>
